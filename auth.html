<!DOCTYPE html><html><head><title>Auth</title></head><body>
<p>Authenticating...</p>
<script>
var params=new URLSearchParams(location.search);
var code=params.get('code');
if(code&&window.opener&&window.opener._msAuthCallback){
  window.opener._msAuthCallback(code);
  document.body.innerHTML='<p>✓ Authenticated. You can close this window.</p>';
  setTimeout(function(){window.close()},2000);
}else if(params.get('error')){
  document.body.innerHTML='<p>Error: '+params.get('error_description')+'</p>';
}else{
  document.body.innerHTML='<p>No auth code received.</p>';
}
</script></body></html>
