<title>STDPS — Compliance Portal</title>
<style>
:root{--bg:#F3F6FB;--sf:#FFF;--bd:#E1E5EB;--ac:#0078D4;--ach:#106EBE;--acs:#DEECF9;--dg:#D13438;--tx:#201F1E;--mt:#605E5C;--bk:#0C0B0B;--f:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;--fm:Consolas,monospace}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;font-family:var(--f);background:var(--bg);color:var(--tx);overflow:hidden}
#G{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;padding:20px}
.g{width:440px;max-width:100%;padding:38px 34px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;box-shadow:0 6px 14px rgba(0,0,0,.08);position:relative}
.g::before{content:'';position:absolute;top:0;left:24px;right:24px;height:3px;background:linear-gradient(90deg,var(--ac),#40E0D0);border-radius:3px 3px 0 0}
.lo{display:block;max-width:200px;height:32px;margin:0 auto 14px}
.t{font-size:18px;font-weight:600;color:var(--bk);text-align:center;line-height:1.25;margin-bottom:3px}
.u{font-size:11px;color:var(--mt);text-align:center;margin-bottom:20px}
.e{display:flex;align-items:center;justify-content:center;gap:7px;background:var(--acs);border:1px solid rgba(0,120,212,.2);border-radius:6px;padding:7px 10px;margin-bottom:18px}
.e span{font-size:9px;letter-spacing:.3px;color:var(--ac);font-weight:500}
.d{width:5px;height:5px;background:var(--ac);border-radius:50%;animation:b 1.5s infinite}@keyframes b{0%,100%{opacity:1}50%{opacity:.4}}
.l{font-size:11px;color:var(--mt);margin-bottom:7px;font-weight:500}
.k{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:var(--fm);font-size:13px;letter-spacing:2px;outline:none;transition:.2s;text-align:center}
.k:focus{border-color:var(--ac);background:var(--sf);box-shadow:0 0 0 3px rgba(0,120,212,.15)}
.k.x{border-color:var(--dg);animation:q .35s}@keyframes q{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.m{font-size:11px;color:var(--dg);text-align:center;margin-top:7px;min-height:14px;font-weight:500}
.b{width:100%;margin-top:12px;padding:11px;background:var(--ac);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s}.b:hover{background:var(--ach)}
.p{width:100%;height:3px;background:var(--bd);border-radius:2px;margin-top:10px;overflow:hidden;display:none}
.pf{height:100%;background:linear-gradient(90deg,var(--ac),#107C10);border-radius:2px;animation:a 1.8s ease-in-out forwards}@keyframes a{0%{width:0%}60%{width:85%}100%{width:100%}}
.f{margin-top:18px;padding-top:14px;border-top:1px solid var(--bd);text-align:center}.f p{font-size:9px;color:var(--mt);line-height:1.7}
#F{display:none;position:fixed;inset:0;width:100%;height:100%;border:none;z-index:5;background:var(--bg)}
</style></head><body>
